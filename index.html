<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="icon.png">
<title>Double</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#071325;
  --surface:#122436;
  --surface2:#0c1b2b;
  --card-size:108px;
  --gap:8px;
  --red:#ff2d5f;
  --black:#37445a;
  --black-border:#49576f;
  --green:#ffffff;
  --text-muted:rgba(255,255,255,0.52);
}

body{
  background:var(--bg);
  font-family:Arial,sans-serif;
  color:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:0 10px 120px;
  gap:14px;
  background:radial-gradient(circle at top,#112945 0%,#071325 48%,#050f1d 100%);
}

.hub-back{
  text-decoration:none;
  border:none;
  border-radius:10px;
  padding:10px 16px;
  color:#fff;
  font-family:Arial,sans-serif;
  font-size:12px;
  font-weight:700;
  letter-spacing:1px;
  cursor:pointer;
  transition:transform .15s ease, filter .15s ease;
  background:linear-gradient(135deg,#ff2d5f,#cf234c);
  box-shadow:0 8px 20px rgba(88,101,242,.18);
}
.hub-back:hover{ filter:brightness(1.08); transform:translateY(-1px); }
.hub-back:active{ transform:translateY(1px); }

.top-actions{
  width:100%;
  max-width:700px;
  display:flex;
  justify-content:flex-end;
  gap:10px;
  flex-wrap:wrap;
}

.deposit-btn,
.switch-game-btn{
  border:none;
  border-radius:10px;
  padding:10px 16px;
  color:#fff;
  font-family:Arial,sans-serif;
  font-size:12px;
  font-weight:700;
  letter-spacing:1px;
  cursor:pointer;
  transition:transform .15s ease, filter .15s ease;
}
.deposit-btn{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  box-shadow:0 8px 20px rgba(46,204,113,.18);
}
.switch-game-btn{
  background:linear-gradient(135deg,#ff2d5f,#cf234c);
  box-shadow:0 8px 20px rgba(88,101,242,.18);
}
.deposit-btn:hover,
.switch-game-btn:hover{ filter:brightness(1.08); transform:translateY(-1px); }
.deposit-btn:active,
.switch-game-btn:active{ transform:translateY(1px); }

.logo{
  font-family:Arial,sans-serif;
  font-size:clamp(16px,4vw,26px);
  font-weight:900;
  letter-spacing:6px;
  color:#fff;
  text-transform:uppercase;
  opacity:.85;
}

.page-header{
  width:100%;
  max-width:760px;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:8px;
  padding:14px 16px;
  border-radius:0 0 16px 16px;
  background:#0c1a2b;
  border:1px solid rgba(255,255,255,.08);
}
.page-header-left{
  display:none;
}
.page-back{
  width:38px;
  height:38px;
  border-radius:12px;
  background:#16273a;
  color:#fff;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  flex-shrink:0;
}
.page-icon{
  width:38px;
  height:38px;
  border-radius:12px;
  background:var(--red);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  flex-shrink:0;
}
.page-title{
  font-family:Arial,sans-serif;
  font-size:18px;
  letter-spacing:1px;
}
.page-sub{
  font-size:11px;
  color:rgba(255,255,255,.58);
  margin-top:2px;
}
.page-live{
  padding:6px 10px;
  border-radius:999px;
  background:#1a2f44;
  font-size:11px;
  font-weight:800;
  white-space:nowrap;
}

.header-actions{
  display:flex;
  align-items:center;
  gap:8px;
}

.header-back{
  width:42px;
  height:42px;
  border-radius:10px;
  background:#112436;
  border:1px solid rgba(255,255,255,.15);
  color:#fff;
  font-size:24px;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
}

.header-balance{
  min-width:120px;
  text-align:center;
  padding:10px 12px;
  border-radius:10px;
  background:#112436;
  border:1px solid rgba(255,255,255,.15);
  font-size:16px;
  font-weight:900;
}

.header-deposit{
  border:none;
  border-radius:10px;
  padding:11px 16px;
  background:var(--red);
  color:#fff;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
}

.header-user{
  width:42px;
  height:42px;
  border:none;
  border-radius:10px;
  background:#112436;
  border:1px solid rgba(255,255,255,.15);
  color:#fff;
  font-size:21px;
}

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   BALANCE BAR
â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
.balance-bar{
  width:100%; max-width:760px;
  background:var(--surface);
  border:1px solid rgba(255,255,255,.06);
  border-radius:14px;
  padding:12px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.bal-label{
  font-size:10px;
  letter-spacing:3px;
  color:var(--text-muted);
  text-transform:uppercase;
}
.bal-value{
  font-family:Arial,sans-serif;
  font-size:22px;
  font-weight:900;
  color:#fff;
  transition:color .3s;
}
.bal-value.win { color:#22c55e; }
.bal-value.lose{ color:#e74c3c; }

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   COUNTDOWN BAR
â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
.countdown-wrap{
  width:100%; max-width:760px;
  background:linear-gradient(180deg,#0f2134 0%,#0b1b2b 100%);
  border:1px solid rgba(255,255,255,.06);
  border-radius:12px;
  padding:12px 20px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.countdown-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.countdown-label{
  font-size:10px;
  letter-spacing:3px;
  color:var(--text-muted);
  text-transform:uppercase;
}
.countdown-num{
  font-family:Arial,sans-serif;
  font-size:20px;
  font-weight:900;
  color:#fff;
  min-width:28px;
  text-align:right;
  transition:color .3s;
}
.countdown-num.urgent{ color:#e74c3c; animation:pulse .5s ease infinite alternate; }
@keyframes pulse{ to{ opacity:.5; } }
.countdown-num.spinning{ color:rgba(255,255,255,.25); }

.progress-bar-bg{
  width:100%;
  height:10px;
  background:rgba(255,255,255,.08);
  border-radius:999px;
  overflow:hidden;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.35);
}
.progress-bar-fill{
  height:100%;
  border-radius:inherit;
  background:linear-gradient(90deg,#ff4b76 0%,#ff2d5f 100%);
  box-shadow:0 0 14px rgba(255,255,255,.18);
  transition:width .06s linear, background .3s, box-shadow .3s;
  width:100%;
}
.progress-bar-fill.urgent{
  background:linear-gradient(90deg,#ff7b72 0%,#e74c3c 100%);
  box-shadow:0 0 14px rgba(231,76,60,.28);
}
.progress-bar-fill.spinning{
  background:rgba(255,255,255,.15);
  box-shadow:none;
}

.phase-label{
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--text-muted);
  text-align:center;
}
.phase-label.bet-phase{ color:#22c55e; }
.phase-label.spin-phase{ color:rgba(255,255,255,.3); }

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   STRIP
â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
.strip-shell{
  width:100%; max-width:760px;
  position:relative;
  background:linear-gradient(180deg,#0d1f30 0%,#0b1a2a 100%);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:8px 0;
}
.pointer{
  position:absolute;
  top:-6px; bottom:-6px;
  left:50%;
  transform:translateX(-50%);
  width:5px;
  background:#fff;
  z-index:20;
  pointer-events:none;
}
.pointer::before{
  content:'';
  position:absolute;
  top:-10px; left:50%;
  transform:translateX(-50%);
  border-left:8px solid transparent;
  border-right:8px solid transparent;
  border-top:12px solid #fff;
}
.pointer::after{
  content:'';
  position:absolute;
  bottom:-10px; left:50%;
  transform:translateX(-50%);
  border-left:8px solid transparent;
  border-right:8px solid transparent;
  border-bottom:12px solid #fff;
}
.strip-shell::before,.strip-shell::after{
  content:''; position:absolute; top:0; bottom:0; width:100px; z-index:10; pointer-events:none;
}
.strip-shell::before{ left:0; background:linear-gradient(to right,var(--bg),transparent); }
.strip-shell::after { right:0; background:linear-gradient(to left,var(--bg),transparent); }

.strip-clip{ overflow:hidden; width:100%; padding:16px 0; }
.strip-track{ display:flex; gap:var(--gap); will-change:transform; }

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   CARDS
â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
.card{
  flex-shrink:0;
  width:var(--card-size); height:var(--card-size);
  border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-family:Arial,sans-serif;
  font-size:18px; font-weight:700;
  position:relative; user-select:none;
  border:2px solid transparent;
  transition:transform .1s;
}
.card-num{
  position:absolute; top:50%; left:0; right:0;
  transform:translateY(-50%);
  text-align:center; font-size:40px; font-weight:900; letter-spacing:0; line-height:1;
}

.card.red  { background:var(--red);   border-color:rgba(255,255,255,.08); }
.card.black{ background:var(--black); border-color:var(--black-border); }
.card.green{ background:var(--green); border-color:rgba(255,255,255,.08); }
.card.green .card-num{ color:#ff2d5f; }

.card.winner{ transform:scale(1.18); z-index:5; border-color:rgba(255,255,255,.55)!important; }

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   BET PANEL
â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
.bet-panel{
  width:100%; max-width:760px;
  background:linear-gradient(180deg,#122538 0%,#0d1e2f 100%);
  border:1px solid rgba(255,255,255,.06);
  border-radius:14px;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:14px;
  transition:opacity .3s;
}
.bet-panel.locked{
  opacity:.4;
  pointer-events:none;
}

.bet-title{
  font-size:34px; letter-spacing:0;
  color:#fff; text-transform:none;
  font-weight:800;
}

/* Amount chips */
.bet-amounts{
  display:flex; gap:8px; flex-wrap:wrap;
}
.chip{
  padding:7px 14px;
  border-radius:8px;
  font-family:Arial,sans-serif;
  font-size:12px; font-weight:700;
  background:#1a2d42;
  border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.6);
  cursor:pointer;
  transition:all .15s;
  user-select:none;
}
.chip:hover{ border-color:rgba(255,255,255,.3); color:#fff; }
.chip.active{ background:#fff; color:#111; border-color:#fff; }

.chip-clear{
  padding:7px 14px;
  border-radius:8px;
  font-size:12px; font-weight:700;
  background:transparent;
  border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.35);
  cursor:pointer;
  transition:all .15s;
  font-family:Arial,sans-serif;
  letter-spacing:1px;
}
.chip-clear:hover{ border-color:rgba(255,255,255,.3); color:#fff; }

.mini-adjust{
  min-width:66px;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.2);
  background:#1a2c41;
  color:#fff;
  font-size:26px;
  font-weight:800;
  cursor:pointer;
}

/* Bet input row */
.bet-input-row{
  display:flex; align-items:center; gap:10px;
}
.bet-input{
  flex:1;
  background:#0b1a2b;
  border:1px solid rgba(255,255,255,.1);
  border-radius:8px;
  padding:10px 14px;
  font-family:Arial,sans-serif;
  font-size:16px; font-weight:700;
  color:#fff;
  outline:none;
  min-width:0;
}
.bet-input:focus{ border-color:rgba(255,255,255,.3); }

/* Colour buttons */
.bet-colors{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

.bet-btn{
  position:relative;
  padding:14px 10px;
  border-radius:10px;
  border:2px solid transparent;
  font-family:Arial,sans-serif;
  font-size:13px; font-weight:700; letter-spacing:1px;
  cursor:pointer;
  transition:all .15s;
  display:flex; flex-direction:column;
  align-items:center; gap:4px;
  user-select:none;
}
.bet-btn .bb-label{
  font-size:26px;
  opacity:1;
  letter-spacing:0;
  font-weight:900;
}
.bet-btn .bb-mult{ display:none; }

.bet-btn.bb-red{
  background:var(--red);
  border-color:rgba(255,255,255,.08);
  color:#fff;
}
.bet-btn.bb-black{
  background:var(--black);
  border-color:var(--black-border);
  color:#fff;
}
.bet-btn.bb-green{
  background:var(--green);
  border-color:rgba(255,255,255,.2);
  color:#ff2d5f;
}

.bet-btn:hover:not(:disabled){ filter:brightness(1.15); transform:translateY(-1px); }
.bet-btn:active:not(:disabled){ transform:translateY(1px); }
.bet-btn:disabled{ opacity:.35; cursor:not-allowed; filter:none; transform:none; }

.bet-btn.selected{
  border-color:#fff!important;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.2);
}

.round-status-btn{
  width:100%;
  border:none;
  border-radius:10px;
  background:#4d2230;
  color:rgba(255,255,255,.65);
  font-size:34px;
  font-weight:800;
  padding:14px;
}

.place-bet-btn{
  width:100%;
  border:none;
  border-radius:10px;
  background:var(--red);
  color:#fff;
  font-size:22px;
  font-weight:800;
  padding:12px;
  cursor:pointer;
}

.place-bet-btn:disabled{
  opacity:.55;
  cursor:not-allowed;
}

/* pending bet label */
.bet-btn .pending-label{
  position:absolute; bottom:-8px; left:50%;
  transform:translateX(-50%);
  background:#fff; color:#111;
  font-size:9px; font-weight:700;
  padding:2px 7px; border-radius:99px;
  white-space:nowrap;
  opacity:0; transition:opacity .2s;
  font-family:Arial,sans-serif;
  letter-spacing:1px;
}
.bet-btn.selected .pending-label{ opacity:1; }

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   WIN/LOSE TOAST
â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
.toast{
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%) scale(.5);
  background:var(--surface);
  border:2px solid transparent;
  border-radius:18px;
  padding:28px 44px;
  text-align:center;
  z-index:200;
  pointer-events:none;
  opacity:0;
  transition:none;
}
.toast.show{
  animation:toastPop .5s cubic-bezier(.34,1.56,.64,1) forwards,
            toastFade .4s ease 1.8s forwards;
}
.toast.win-toast { border-color:#22c55e; }
.toast.lose-toast{ border-color:#e74c3c; }

.toast-emoji{ display:none; }
.toast-title{
  font-family:Arial,sans-serif;
  font-size:22px; font-weight:900; letter-spacing:2px;
}
.toast.win-toast  .toast-title{ color:#22c55e; }
.toast.lose-toast .toast-title{ color:#e74c3c; }
.toast-sub{
  font-size:14px; color:var(--text-muted);
  margin-top:4px; letter-spacing:1px;
}
.toast-amount{
  font-family:Arial,sans-serif;
  font-size:28px; font-weight:900;
  margin-top:8px;
}
.toast.win-toast  .toast-amount{ color:#22c55e; }
.toast.lose-toast .toast-amount{ color:#e74c3c; }

@keyframes toastPop{
  0%  {opacity:0;transform:translate(-50%,-50%) scale(.5)}
  100%{opacity:1;transform:translate(-50%,-50%) scale(1)}
}
@keyframes toastFade{
  0%  {opacity:1}
  100%{opacity:0;transform:translate(-50%,-56%) scale(.95)}
}

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   RESULT PANEL
â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
.result-panel{
  width:100%; max-width:760px;
  background:linear-gradient(180deg,#102335 0%,#0c1c2c 100%);
  border:1px solid rgba(255,255,255,.06);
  border-radius:14px;
  padding:14px 20px;
  display:flex; align-items:center;
  justify-content:space-between;
  min-height:66px;
}
.result-label{ font-size:10px; letter-spacing:3px; color:var(--text-muted); text-transform:uppercase; margin-bottom:3px; }
.result-number{
  font-family:Arial,sans-serif;
  font-size:clamp(32px,9vw,66px); font-weight:900; line-height:1;
}
.result-number.idle{ color:rgba(255,255,255,.1); }
.result-number.red  { color:#e74c3c; }
.result-number.green{ color:#ff2d5f; }

<script>
/* â”€â”€â”€ DATA â”€â”€â”€ */
const NUMS = [0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];

/* â”€â”€â”€ DOM â”€â”€â”€ */

/* â”€â”€â”€ AUDIO â”€â”€â”€ */
let audioCtx = null;
function ensureAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
}

function playTick(pitch=1, vol=0.18){
  try{
    ensureAudio();
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.04,audioCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.15));
    const src=audioCtx.createBufferSource(); src.buffer=buf; src.playbackRate.value=pitch;
    const bp=audioCtx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=1800*pitch; bp.Q.value=0.8;
    const g=audioCtx.createGain(); g.gain.value=vol;
    src.connect(bp); bp.connect(g); g.connect(audioCtx.destination); src.start();
  }catch(e){}
}

function playLand(){
  try{
    ensureAudio();
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.12,audioCtx.sampleRate);

    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.08));
    const src=audioCtx.createBufferSource(); src.buffer=buf;
    const lp=audioCtx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=600;
    const g=audioCtx.createGain(); g.gain.value=0.55;
    src.connect(lp); lp.connect(g); g.connect(audioCtx.destination); src.start();
  }catch(e){}
}

function playWin(){
  try{
    ensureAudio();
    const notes=[523,659,784,1047];
    notes.forEach((freq,i)=>{
      setTimeout(()=>{
        const osc=audioCtx.createOscillator();
        const g=audioCtx.createGain();
        osc.type="sine"; osc.frequency.value=freq;
        g.gain.setValueAtTime(0,audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0.22,audioCtx.currentTime+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.28);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime+0.3);
      }, i*90);
    });
    setTimeout(()=>{
      const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.18,audioCtx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.25));
      const src=audioCtx.createBufferSource(); src.buffer=buf;
      const hp=audioCtx.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=4000;
      const g=audioCtx.createGain(); g.gain.value=0.12;
      src.connect(hp); hp.connect(g); g.connect(audioCtx.destination); src.start();
    },360);
  }catch(e){}
}

function playLose(){
  try{
    ensureAudio();

      setTimeout(()=>{
        const osc=audioCtx.createOscillator();

        g.gain.setValueAtTime(0,audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0.15,audioCtx.currentTime+0.03);
        g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.35);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime+0.38);
      },i*180);
    });
  }catch(e){}
}

function playJackpot(){
  try{
    ensureAudio();
    const melody=[523,659,784,880,1047,880,1047];
    melody.forEach((freq,i)=>{
      setTimeout(()=>{
        const osc=audioCtx.createOscillator();
        const g=audioCtx.createGain();

        g.gain.setValueAtTime(0,audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0.3,audioCtx.currentTime+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.22);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime+0.25);
      },i*100);
    });
    [0,100,200,300,400].forEach(delay=>{
      setTimeout(()=>{
        const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.08,audioCtx.sampleRate);
        const d=buf.getChannelData(0);
        for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.2));
        const src=audioCtx.createBufferSource(); src.buffer=buf;
        const hp=audioCtx.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=5000;
        const g=audioCtx.createGain(); g.gain.value=0.1;
        src.connect(hp); hp.connect(g); g.connect(audioCtx.destination); src.start();
      },delay);
    });
  }catch(e){}
}

function playCountTick(){
  try{
    ensureAudio();
    const osc=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    osc.type="sine"; osc.frequency.value=880;
    g.gain.setValueAtTime(0,audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0.08,audioCtx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.12);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime+0.13);
  }catch(e){}
}

/* â”€â”€â”€ CARD METRICS â”€â”€â”€ */
function CARD_W(){ return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-size'))||72; }
function GAP()   { return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gap'))||8; }
function STRIDE(){ return CARD_W()+GAP(); }

const FLAME_SVG   = `<svg viewBox="0 0 24 24" fill="none"><path d="M12 2C12 2 7 8 7 13a5 5 0 0010 0c0-3-2-6-2-6s-1 2-2 2c-1 0-1-7 1-7z" fill="currentColor"/><path d="M12 16a2 2 0 000 4 2 2 0 000-4z" fill="currentColor" opacity=".4"/></svg>`;
const DIAMOND_SVG = `<svg viewBox="0 0 24 24" fill="none"><path d="M12 3L20 12L12 21L4 12Z" fill="currentColor"/></svg>`;

function makeCard(n){
  const c=cls(n);
  const div=document.createElement("div");
  div.className=`card ${c}`;
  div.innerHTML=`<div class="card-num">${n}</div>`;
  return div;
}

/* â”€â”€â”€ BALANCE â”€â”€â”€ */
function fmtMoney(v){ return "R$ "+v.toLocaleString("pt-BR",{minimumFractionDigits:2}); }

function updateBalance(delta){
  balance += delta;
  localStorage.setItem(STORAGE_KEY, String(balance));
  balVal.textContent = fmtMoney(balance);
  if(headerBalance) headerBalance.textContent = fmtMoney(balance);
  balVal.classList.remove("win","lose");
  if(delta>0){ balVal.classList.add("win"); setTimeout(()=>balVal.classList.remove("win"),1200); }
  else if(delta<0){ balVal.classList.add("lose"); setTimeout(()=>balVal.classList.remove("lose"),1200); }
}

function openDeposit(initial=false){
  const suggested = initial && balance <= 0 ? "1000" : "";
  const raw = prompt(initial ? "Escolha seu saldo inicial:" : "Digite o valor do depÃ³sito:", suggested);
  if(raw === null) return;

  const amt = parseFloat(String(raw).replace(/\s+/g,"").replace(/\./g,"").replace(",","."));
  if(isNaN(amt) || amt <= 0){
    showToastMsg("Valor invÃ¡lido","Digite um valor maior que zero","âš ï¸",false);
    return;
  }

  updateBalance(amt);
  showToastMsg("DepÃ³sito realizado","Saldo atualizado com sucesso","ðŸ’¸",true,"+"+fmtMoney(amt));
}

/* â”€â”€â”€ BET UI â”€â”€â”€ */
function getBetAmount(){
  const v=parseFloat(betInput.value);
  return (!isNaN(v)&&v>0)?v:0;
}

function setChip(val, el){
  betInput.value = val;
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  if(el) el.classList.add("active");
  updateBetDisplay();
}

function halfBet(){
  const current = getBetAmount();
  const next = Math.max(1, current / 2);
  betInput.value = String(next.toFixed(2));
  updateBetDisplay();
}

function doubleBet(){
  const current = getBetAmount();
  const next = Math.max(1, current * 2);
  betInput.value = String(next.toFixed(2));
  updateBetDisplay();
}

function clearBet(){
  if(betPlaced && !isSpinning){
    updateBalance(roundBetAmount);
  }
  betPlaced = false;
  roundBetAmount = 0;
  betColor=null;
  document.querySelectorAll(".bet-btn").forEach(b=>b.classList.remove("selected"));
  updateBetDisplay();
}

function placeBet(){
  if(isSpinning) return;
  const amt=getBetAmount();
  if(!betColor){
    showToastMsg("Escolha uma cor","","⚠️",false);
    return;
  }
  if(amt<=0){
    showToastMsg("Digite um valor valido","","⚠️",false);
    return;
  }
  if(amt>balance){
    showToastMsg("Saldo insuficiente","","❌",false);
    return;
  }

  if(betPlaced){
    showToastMsg("Aposta atualizada","","🎯",true);
    updateBalance(roundBetAmount);
  }

  roundBetAmount = amt;
  betPlaced = true;
  updateBalance(-amt);
  showToastMsg("Aposta confirmada",`${fmtMoney(amt)} em ${CNAMES[betColor]}`,"🎯",true);
}

function selectBet(color){
  ensureAudio();
  if(isSpinning) return;
  const amt=getBetAmount();
  if(amt<=0){ betInput.focus(); return; }
  if(amt>balance){ showToastMsg("Saldo insuficiente","","âŒ",false); return; }
  betColor = (betColor===color) ? null : color;
  document.querySelectorAll(".bet-btn").forEach(b=>b.classList.remove("selected"));
  if(betColor){
    document.getElementById("bb"+cap(betColor)).classList.add("selected");
    document.getElementById("pl"+cap(betColor)).textContent = fmtMoney(amt);
  }
  updateBetDisplay();
}

function cap(s){ return s[0].toUpperCase()+s.slice(1); }

function updateBetDisplay(){
  const amt=getBetAmount();
  if(betColor&&amt>0){
    betDisp.textContent = `${fmtMoney(amt)} em ${CNAMES[betColor]}`;
    betDisp.style.color = "#fff";
  } else {
    betDisp.textContent = "â€”";
    betDisp.style.color = "rgba(255,255,255,.4)";
  }
}

betInput.addEventListener("input",()=>{ updateBetDisplay(); });

/* â”€â”€â”€ TOAST â”€â”€â”€ */
function showToastMsg(title, sub, emoji, isWin, amount=""){
  toast.className = "toast "+(isWin?"win-toast":"lose-toast");
  document.getElementById("toastEmoji").textContent  = "";
  document.getElementById("toastTitle").textContent  = title;
  document.getElementById("toastSub").textContent    = sub;
  document.getElementById("toastAmount").textContent = amount;
  toast.classList.add("show");
  setTimeout(()=>{ toast.className="toast"; },2400);
}

/* â”€â”€â”€ COUNTDOWN â”€â”€â”€ */
function startCountdown(){
  clearInterval(countdownTimer);
  if(countdownAnim) cancelAnimationFrame(countdownAnim);

  countdownSec = BET_SECONDS;
  lastCountSound = countdownSec;
  betPanel.classList.remove("locked");
  if(placeBetBtn) placeBetBtn.disabled = false;
  countNum.classList.remove("urgent","spinning");
  progressFill.classList.remove("urgent","spinning");
  phaseLabel.className = "phase-label bet-phase";
  phaseLabel.textContent = "â— APOSTAS ABERTAS";
  countLabel.textContent = "Tempo para apostar";
  if(roundStatusBtn) roundStatusBtn.textContent = "Esperando";
  countNum.textContent = countdownSec;
  progressFill.style.width = "100%";

  const startedAt = performance.now();
  const duration = BET_SECONDS * 1000;

  function animateCountdown(now){
    const elapsed = now - startedAt;
    const remainingMs = Math.max(duration - elapsed, 0);
    const progress = remainingMs / duration;
    const nextSec = Math.max(Math.ceil(remainingMs / 1000), 0);

    countdownSec = nextSec;
    countNum.textContent = nextSec;
    progressFill.style.width = `${progress * 100}%`;

    if(nextSec <= 3 && nextSec > 0){
      countNum.classList.add("urgent");
      progressFill.classList.add("urgent");
      if(nextSec !== lastCountSound){
        lastCountSound = nextSec;
        try{ playCountTick(); }catch(e){}
      }
    }

    if(remainingMs > 0){
      countdownAnim = requestAnimationFrame(animateCountdown);
    } else {
      countdownAnim = null;
      lockBetsAndSpin();
    }
  }

  countdownAnim = requestAnimationFrame(animateCountdown);
}

function lockBetsAndSpin(){
  clearInterval(countdownTimer);
  if(countdownAnim) cancelAnimationFrame(countdownAnim);
  countdownAnim = null;

  betPanel.classList.add("locked");
  if(placeBetBtn) placeBetBtn.disabled = true;
  countNum.classList.remove("urgent");
  countNum.classList.add("spinning");
  progressFill.classList.remove("urgent");
  progressFill.classList.add("spinning");
  progressFill.style.width = "100%";
  phaseLabel.className = "phase-label spin-phase";
  phaseLabel.textContent = "â—Œ GIRANDO...";
  countLabel.textContent = "Rodada em andamento";
  if(roundStatusBtn) roundStatusBtn.textContent = "Girando...";
  countNum.textContent = "â€”";
  spin();
}

/* â”€â”€â”€ SPIN â”€â”€â”€ */
const REPEATS=7;

function spin(){
  if(isSpinning) return;
  ensureAudio();
  isSpinning=true;

  const winIdx=Math.floor(Math.random()*NUMS.length);
  const winNum=NUMS[winIdx];

  track.innerHTML="";
  const allNums=[];
  for(let r=0;r<REPEATS;r++) NUMS.forEach(n=>allNums.push(n));
  const targetGlobal=(REPEATS-1)*NUMS.length+winIdx;
  allNums.forEach(n=>track.appendChild(makeCard(n)));

  const S=STRIDE(), cw=CARD_W();
  const cx=clip.getBoundingClientRect().width/2;
  const finalTX=-(targetGlobal*S-cx+cw/2);
  const startTX= cx-cw/2;

  track.style.transition="none";
  track.style.transform=`translateX(${startTX}px)`;
  void track.offsetWidth;

  const DURATION=4800+Math.random()*1500;
  let start=null, lastCard=-1;
  function ease(t){ return 1-Math.pow(1-t,4); }

  function frame(ts){
    if(!start) start=ts;
    const t=Math.min((ts-start)/DURATION,1);
    const e=ease(t);
    const tx=startTX+(finalTX-startTX)*e;
    track.style.transform=`translateX(${tx}px)`;

    const cur=Math.round((cx-tx-cw/2)/S);
    if(cur!==lastCard&&cur>=0&&cur<allNums.length){
      lastCard=cur;
      const speed=(1-e)*2;
      playTick(0.85+speed*0.7, t>0.75?0.22:0.14);
    }

    if(t<1){
      requestAnimationFrame(frame);
    } else {
      track.style.transform=`translateX(${finalTX}px)`;

      const wCard=track.children[targetGlobal];
      const c=cls(winNum);
      wCard.className=`card ${c} winner`;
      wCard.innerHTML=`<div class="card-num">${winNum}</div>`;

      playLand();
      if(navigator.vibrate) navigator.vibrate([80,40,120]);

      addHist(winNum);

      // â”€â”€ RESOLVE BET (lÃ³gica correta de cassino) â”€â”€
      setTimeout(()=>{
        if(betPlaced && betColor){
          const amt = roundBetAmount;
          if(betColor === c){
            // GANHOU: devolve a aposta + o lucro
            // Ex: apostou R$250 no vermelho (Ã—2) â†’ recebe R$500 de volta, lucro = R$250
            const totalReturn = amt * MULT[c];   // total que volta pro saldo
            const profit      = totalReturn - amt; // lucro lÃ­quido

            updateBalance(totalReturn); // jÃ¡ debitamos antes, agora retornamos o total

            if(c === "green"){
              playJackpot();
              showToastMsg("JACKPOT! ðŸŽ°","Branco acertado!","ðŸ¤‘",true,"+"+fmtMoney(profit));
            } else {
              playWin();
              showToastMsg("GANHOU!","Cor certa!","ðŸŽ‰",true,"+"+fmtMoney(profit));
            }
          } else {
            // PERDEU: jÃ¡ debitou antes, nÃ£o faz nada
            playLose();
            showToastMsg("PERDEU","Tente novamente","ðŸ˜”",false,"-"+fmtMoney(amt));
          }
          betPlaced = false;
          roundBetAmount = 0;
          clearBet();
        }

        isSpinning=false;
        // Aguarda 3s apÃ³s a rodada e recomeÃ§a o countdown
        setTimeout(()=>{ startCountdown(); }, 3000);
      }, 400);
    }
  }

  requestAnimationFrame(frame);
}


function addHist(n){
  const c=cls(n);
  const d=document.createElement("div");
  d.className=`hc ${c} new`;
  d.textContent=n;
  hist.prepend(d);
  while(hist.children.length>20) hist.removeChild(hist.lastChild);
  setTimeout(()=>d.classList.remove("new"),400);
}

/* â”€â”€â”€ INIT â”€â”€â”€ */
(function init(){
  for(let r=0;r<3;r++) NUMS.forEach(n=>track.appendChild(makeCard(n)));
  const cx=clip.getBoundingClientRect().width/2;
  track.style.transform=`translateX(${cx-CARD_W()/2}px)`;
  updateBetDisplay();
  balVal.textContent = fmtMoney(balance);
  if(headerBalance) headerBalance.textContent = fmtMoney(balance);
  // Inicia o ciclo automÃ¡tico com um pequeno delay
  setTimeout(()=>{ startCountdown(); }, 800);
})();

window.addEventListener('storage', ()=>{
  balance = Number(localStorage.getItem(STORAGE_KEY) || 0);
  balVal.textContent = fmtMoney(balance);
  if(headerBalance) headerBalance.textContent = fmtMoney(balance);
});
</script>
